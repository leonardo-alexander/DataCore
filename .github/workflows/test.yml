name: Run Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup php
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4

      - name: install dependencies
        run: composer install --no-progress --prefer-dist

      - name: run tests (pest)
        run: php artisan test
